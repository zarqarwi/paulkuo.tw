name = "paulkuo-ticker"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Cron triggers:
#   hourly  — Fitbit, analytics, social, stock (external APIs)
#   every 5 min — Formosa GPS KV→D1 flush (near-zero cost when idle)
[triggers]
crons = ["0 0-15,23 * * *", "*/5 * * * *"]

# KV binding — namespace ID 在 wrangler kv 建立後填入
[[kv_namespaces]]
binding = "TICKER_KV"
id = "c066a2fd7942494c8ead37cc518b191b"

# Environment variables
[vars]
CF_ACCOUNT_ID = "4bf7e4b38d30ab7d4a191eefbf393133"

# D1 binding — Auth database
[[d1_databases]]
binding = "AUTH_DB"
database_name = "paulkuo-auth"
database_id = "1cf40e96-b745-4b5b-9855-c8f5fbb1b3fb"

# R2 binding — TQEF audio storage (Channel C)
[[r2_buckets]]
binding = "TQEF_AUDIO"
bucket_name = "tqef-audio"
