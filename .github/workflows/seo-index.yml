name: SEO Index Submit

on:
  workflow_run:
    workflows: ["Build & Deploy"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: seo-index-push
  cancel-in-progress: false

jobs:
  index-submit:
    runs-on: ubuntu-latest
    # Only run if Build & Deploy succeeded (or manual trigger)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install google-auth requests

      - name: Submit new URLs to Google Indexing API
        env:
          GOOGLE_INDEXING_KEY: ${{ secrets.GOOGLE_INDEXING_KEY }}
        run: python scripts/seo-index-submit.py

      - name: Commit updated indexed URLs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .seo/indexed-urls.txt

          # Skip if nothing changed
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(seo): update indexed URLs list"

          # Retry with rebase up to 3 times (防 race with parallel pushes)
          for i in 1 2 3; do
            if git pull --rebase origin main && git push origin main; then
              echo "✅ Push succeeded on attempt $i"
              exit 0
            fi
            echo "⚠️  Push attempt $i failed, retrying..."
            sleep $((RANDOM % 10 + 5))
          done

          echo "❌ All retry attempts failed"
          exit 1
