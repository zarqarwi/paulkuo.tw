name: AI-Ready Optimization

on:
  workflow_dispatch:
    inputs:
      max_iterations:
        description: 'Max optimization iterations'
        default: '5'
        type: string
  schedule:
    - cron: '0 1 * * 1'
  push:
    branches: [main]
    paths:
      - 'src/content/articles/**/*.md'

permissions:
  contents: write

concurrency:
  group: ai-ready-opt-push
  cancel-in-progress: false

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic requests pyyaml

      - name: Configure git
        run: |
          git config user.name "ai-ready-bot"
          git config user.email "bot@paulkuo.tw"

      - name: Run optimization
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EVAL_AUTH_TOKEN: ${{ secrets.EVAL_AUTH_TOKEN }}
        run: python ai-ready-opt/optimize.py --max-iterations ${{ inputs.max_iterations || '5' }}

      - name: Commit experiment log
        run: |
          git add ai-ready-opt/experiments.json

          # Skip if nothing changed
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update ai-ready experiment log"

          # Retry with rebase up to 3 times (防 race with parallel pushes)
          for i in 1 2 3; do
            if git pull --rebase origin main && git push origin main; then
              echo "✅ Push succeeded on attempt $i"
              exit 0
            fi
            echo "⚠️  Push attempt $i failed, retrying..."
            sleep $((RANDOM % 10 + 5))
          done

          echo "❌ All retry attempts failed"
          exit 1
