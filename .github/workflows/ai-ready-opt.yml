name: AI-Ready Optimization

on:
  workflow_dispatch:
    inputs:
      max_iterations:
        description: 'Max optimization iterations'
        default: '5'
        type: string
  schedule:
    - cron: '0 1 * * 1'
  push:
    branches: [main]
    paths:
      - 'src/content/articles/**/*.md'

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic requests pyyaml

      - name: Configure git
        run: |
          git config user.name "ai-ready-bot"
          git config user.email "bot@paulkuo.tw"

      - name: Run optimization
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EVAL_AUTH_TOKEN: ${{ secrets.EVAL_AUTH_TOKEN }}
        run: python ai-ready-opt/optimize.py --max-iterations ${{ inputs.max_iterations || '5' }}

      - name: Commit experiment log
        run: |
          git add ai-ready-opt/experiments.json
          git diff --cached --quiet || git commit -m "chore: update ai-ready experiment log"
          git push origin main
