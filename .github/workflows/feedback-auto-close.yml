name: Feedback Auto Close
on:
  issues:
    types: [closed]

permissions:
  issues: read

jobs:
  auto-close-feedback:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.body, 'feedback-id:')
    steps:
      - name: Extract feedback ID and PATCH
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ADMIN_TOKEN: ${{ secrets.FORMOSA_ADMIN_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # Read issue body at runtime via gh api — avoids shell expansion of untrusted content
          BODY=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUMBER}" --jq '.body')
          IDS=$(echo "$BODY" | grep -oP 'feedback-id:\s*\K\d+')

          for ID in $IDS; do
            echo "Closing feedback #$ID..."
            RESPONSE=$(curl -s -X PATCH \
              "https://api.paulkuo.tw/api/formosa/feedback/$ID" \
              -H "Content-Type: application/json" \
              -H "X-Admin-Token: $ADMIN_TOKEN" \
              -d "{\"status\":\"fixed\",\"admin_note\":\"Auto-closed: Issue #${ISSUE_NUMBER} closed\"}")
            echo "Response: $RESPONSE"
          done
