name: Feedback Daily Digest

on:
  schedule:
    # 每天台灣時間 09:00 (UTC 01:00) + 21:00 (UTC 13:00)
    - cron: '0 1,13 * * *'
  workflow_dispatch:

jobs:
  digest:
    name: Check New Feedback
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch feedback status
        id: fetch
        run: |
          RESP=$(curl -s --max-time 10 https://api.paulkuo.tw/api/formosa/feedback/status)

          if ! echo "$RESP" | grep -q '"ok":true'; then
            echo "❌ Feedback API unreachable"
            echo "api_ok=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "api_ok=true" >> $GITHUB_OUTPUT

          # Count by status
          NEW=$(echo "$RESP" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          items = data.get('feedbacks', [])
          new_items = [i for i in items if i['status'] in ('new', 'triaging')]
          fixed = [i for i in items if i['status'] == 'fixed']
          wontfix = [i for i in items if i['status'] == 'wontfix']
          print(f'{len(new_items)}|{len(fixed)}|{len(wontfix)}|{len(items)}')
          details = []
          for i in new_items:
              details.append(f\"- **#{i['id']}** [{i['category']}] {i['description'][:60]}... (status: {i['status']})\")
          # Write details to file for multi-line output
          with open('new_feedback.txt', 'w') as f:
              f.write('\n'.join(details) if details else 'None')
          ")

          NEW_COUNT=$(echo "$NEW" | cut -d'|' -f1)
          FIXED_COUNT=$(echo "$NEW" | cut -d'|' -f2)
          WONTFIX_COUNT=$(echo "$NEW" | cut -d'|' -f3)
          TOTAL=$(echo "$NEW" | cut -d'|' -f4)

          echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT
          echo "fixed_count=$FIXED_COUNT" >> $GITHUB_OUTPUT
          echo "wontfix_count=$WONTFIX_COUNT" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

      - name: Create or update digest issue
        if: steps.fetch.outputs.new_count != '0' && steps.fetch.outputs.api_ok == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const newCount = '${{ steps.fetch.outputs.new_count }}';
            const fixedCount = '${{ steps.fetch.outputs.fixed_count }}';
            const wontfixCount = '${{ steps.fetch.outputs.wontfix_count }}';
            const total = '${{ steps.fetch.outputs.total }}';
            const fs = require('fs');
            const details = fs.readFileSync('new_feedback.txt', 'utf8');
            const now = new Date().toISOString().slice(0, 16);

            const body = `## 📋 Feedback 待處理摘要 (${now})

            **統計：** ${total} 筆回報中，${newCount} 筆待處理 / ${fixedCount} 筆已修 / ${wontfixCount} 筆不修

            ### 待處理項目
            ${details}

            ---
            🤖 Auto-generated by Feedback Daily Digest
            📊 [查看公告板](https://paulkuo.tw/projects/formosa-esg-2026/feedback/log/)
            🔗 [查看 API](https://api.paulkuo.tw/api/formosa/feedback/status)`;

            // Check for existing open digest issue
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'feedback-digest',
              per_page: 1
            });

            if (existing.data.length > 0) {
              // Add comment to existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: body
              });
              console.log(`Updated existing issue #${existing.data[0].number}`);
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `📋 Feedback 待處理 — ${newCount} 筆未解決`,
                body: body,
                labels: ['feedback-digest', 'formosa-esg']
              });
              console.log('Created new digest issue');
            }

      - name: Close digest issue if all resolved
        if: steps.fetch.outputs.new_count == '0' && steps.fetch.outputs.api_ok == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'feedback-digest',
              per_page: 1
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `✅ 所有 feedback 已處理完畢 (${new Date().toISOString().slice(0, 16)})\n\n自動關閉此 issue。`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                state: 'closed'
              });
              console.log(`Closed digest issue #${existing.data[0].number}`);
            }

      - name: Summary
        if: always()
        run: |
          echo "## Feedback Daily Digest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.fetch.outputs.api_ok }}" = "false" ]; then
            echo "❌ Feedback API unreachable" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| 🔴 待處理 (new/triaging) | ${{ steps.fetch.outputs.new_count }} |" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ 已修復 (fixed) | ${{ steps.fetch.outputs.fixed_count }} |" >> $GITHUB_STEP_SUMMARY
            echo "| ⏭️ 不修 (wontfix) | ${{ steps.fetch.outputs.wontfix_count }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Total | ${{ steps.fetch.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
          fi
