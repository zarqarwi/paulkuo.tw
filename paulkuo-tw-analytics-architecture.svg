<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-size: 12px; font-weight: 400; fill: #888780; }
  .arr { stroke: #888780; stroke-width: 1.5; }
  .leader { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 3; }
  
  /* Teal */
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
  .c-teal .th { fill: #085041; }
  .c-teal .ts { fill: #0F6E56; }
  
  /* Coral */
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
  .c-coral .th { fill: #712B13; }
  .c-coral .ts { fill: #993C1D; }
  
  /* Gray */
  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
  .c-gray .th { fill: #444441; }
  .c-gray .ts { fill: #5F5E5A; }
  
  /* Purple */
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
  .c-purple .th { fill: #3C3489; }
  .c-purple .ts { fill: #534AB7; }
  
  /* Blue */
  .c-blue rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
  .c-blue .th { fill: #0C447C; }
  .c-blue .ts { fill: #185FA5; }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text class="th" x="340" y="30" text-anchor="middle">paulkuo.tw analytics architecture</text>
<text class="ts" x="340" y="48" text-anchor="middle">Human visitors + AI/Bot visitors — dual observation</text>

<!-- DATA SOURCE TIER -->
<text class="ts" x="40" y="86" opacity="0.5">Data sources</text>
<line x1="40" y1="92" x2="640" y2="92" stroke="#B4B2A9" stroke-width="0.5" opacity="0.3"/>

<g class="c-teal">
  <rect x="40" y="106" width="180" height="56" rx="8"/>
  <text class="th" x="130" y="126" text-anchor="middle" dominant-baseline="central">Human visitor</text>
  <text class="ts" x="130" y="146" text-anchor="middle" dominant-baseline="central">Browser loads page</text>
</g>

<g class="c-coral">
  <rect x="250" y="106" width="180" height="56" rx="8"/>
  <text class="th" x="340" y="126" text-anchor="middle" dominant-baseline="central">AI bot / crawler</text>
  <text class="ts" x="340" y="146" text-anchor="middle" dominant-baseline="central">GPTBot, ClaudeBot...</text>
</g>

<g class="c-gray">
  <rect x="460" y="106" width="180" height="56" rx="8"/>
  <text class="th" x="550" y="126" text-anchor="middle" dominant-baseline="central">Cloudflare edge</text>
  <text class="ts" x="550" y="146" text-anchor="middle" dominant-baseline="central">All HTTP requests</text>
</g>

<!-- COLLECTION TIER -->
<text class="ts" x="40" y="200" opacity="0.5">Collection layer</text>
<line x1="40" y1="206" x2="640" y2="206" stroke="#B4B2A9" stroke-width="0.5" opacity="0.3"/>

<g class="c-teal">
  <rect x="40" y="220" width="180" height="56" rx="8"/>
  <text class="th" x="130" y="240" text-anchor="middle" dominant-baseline="central">Visit beacon</text>
  <text class="ts" x="130" y="260" text-anchor="middle" dominant-baseline="central">POST /analytics/visit</text>
</g>

<g class="c-teal">
  <rect x="250" y="220" width="180" height="56" rx="8"/>
  <text class="th" x="340" y="240" text-anchor="middle" dominant-baseline="central">Duration beacon</text>
  <text class="ts" x="340" y="260" text-anchor="middle" dominant-baseline="central">POST /analytics/beacon</text>
</g>

<g class="c-gray">
  <rect x="460" y="220" width="180" height="56" rx="8"/>
  <text class="th" x="550" y="240" text-anchor="middle" dominant-baseline="central">Zone Analytics</text>
  <text class="ts" x="550" y="260" text-anchor="middle" dominant-baseline="central">httpRequests1dGroups</text>
</g>

<!-- Arrows: sources → collection -->
<line x1="130" y1="162" x2="130" y2="218" class="arr" marker-end="url(#arrow)"/>
<line x1="130" y1="162" x2="340" y2="218" class="arr" marker-end="url(#arrow)" opacity="0.5"/>
<path d="M340 162 L340 190 L550 190 L550 218" fill="none" class="arr" marker-end="url(#arrow)" opacity="0.4"/>
<path d="M550 162 L550 218" fill="none" class="arr" marker-end="url(#arrow)"/>

<!-- PROCESSING TIER -->
<text class="ts" x="40" y="318" opacity="0.5">Processing (Worker cron)</text>
<line x1="40" y1="324" x2="640" y2="324" stroke="#B4B2A9" stroke-width="0.5" opacity="0.3"/>

<g class="c-teal">
  <rect x="40" y="340" width="180" height="56" rx="8"/>
  <text class="th" x="130" y="360" text-anchor="middle" dominant-baseline="central">IP+UA hash dedup</text>
  <text class="ts" x="130" y="380" text-anchor="middle" dominant-baseline="central">Daily unique count</text>
</g>

<g class="c-purple">
  <rect x="250" y="340" width="180" height="56" rx="8"/>
  <text class="th" x="340" y="360" text-anchor="middle" dominant-baseline="central">Duration aggregation</text>
  <text class="ts" x="340" y="380" text-anchor="middle" dominant-baseline="central">Avg time, bounce rate</text>
</g>

<g class="c-gray">
  <rect x="460" y="340" width="180" height="56" rx="8"/>
  <text class="th" x="550" y="360" text-anchor="middle" dominant-baseline="central">Zone uniques</text>
  <text class="ts" x="550" y="380" text-anchor="middle" dominant-baseline="central">All visitors (IP dedup)</text>
</g>

<!-- Arrows: collection → processing -->
<line x1="130" y1="276" x2="130" y2="338" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="276" x2="340" y2="338" class="arr" marker-end="url(#arrow)"/>
<line x1="550" y1="276" x2="550" y2="338" class="arr" marker-end="url(#arrow)"/>

<!-- STORAGE TIER -->
<text class="ts" x="40" y="436" opacity="0.5">Storage (Cloudflare KV)</text>
<line x1="40" y1="442" x2="640" y2="442" stroke="#B4B2A9" stroke-width="0.5" opacity="0.3"/>

<g class="c-teal">
  <rect x="40" y="458" width="180" height="44" rx="8"/>
  <text class="th" x="130" y="480" text-anchor="middle" dominant-baseline="central">analytics:visits:{date}</text>
</g>

<g class="c-purple">
  <rect x="250" y="458" width="180" height="44" rx="8"/>
  <text class="th" x="340" y="480" text-anchor="middle" dominant-baseline="central">analytics:duration</text>
</g>

<g class="c-gray">
  <rect x="460" y="458" width="180" height="44" rx="8"/>
  <text class="th" x="550" y="480" text-anchor="middle" dominant-baseline="central">analytics:zone-uniques</text>
</g>

<!-- Arrows: processing → storage -->
<line x1="130" y1="396" x2="130" y2="456" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="396" x2="340" y2="456" class="arr" marker-end="url(#arrow)"/>
<line x1="550" y1="396" x2="550" y2="456" class="arr" marker-end="url(#arrow)"/>

<!-- CALCULATION TIER -->
<text class="ts" x="40" y="542" opacity="0.5">Calculation</text>
<line x1="40" y1="548" x2="640" y2="548" stroke="#B4B2A9" stroke-width="0.5" opacity="0.3"/>

<g class="c-teal">
  <rect x="80" y="564" width="200" height="56" rx="8"/>
  <text class="th" x="180" y="584" text-anchor="middle" dominant-baseline="central">Human visits = 127</text>
  <text class="ts" x="180" y="604" text-anchor="middle" dominant-baseline="central">Self-hosted beacon</text>
</g>

<g class="c-coral">
  <rect x="400" y="564" width="200" height="56" rx="8"/>
  <text class="th" x="500" y="584" text-anchor="middle" dominant-baseline="central">AI/Bot visits = 973</text>
  <text class="ts" x="500" y="604" text-anchor="middle" dominant-baseline="central">Zone total - human</text>
</g>

<!-- Arrows: storage → calculation -->
<line x1="130" y1="502" x2="180" y2="562" class="arr" marker-end="url(#arrow)"/>
<path d="M550 502 L550 536 L500 536 L500 562" fill="none" class="arr" marker-end="url(#arrow)"/>
<path d="M130 502 L130 536 L500 536" fill="none" class="arr" opacity="0.3" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 3"/>
<text class="ts" x="310" y="532" text-anchor="middle" opacity="0.5">subtract</text>

<!-- DISPLAY TIER -->
<text class="ts" x="40" y="658" opacity="0.5">Display (paulkuo.tw/#feed)</text>
<line x1="40" y1="664" x2="640" y2="664" stroke="#B4B2A9" stroke-width="0.5" opacity="0.3"/>

<g class="c-blue">
  <rect x="140" y="678" width="400" height="32" rx="8"/>
  <text class="th" x="340" y="694" text-anchor="middle" dominant-baseline="central">Traffic analytics dashboard — dual view</text>
</g>

<!-- Arrows: calculation → display -->
<line x1="180" y1="620" x2="280" y2="676" class="arr" marker-end="url(#arrow)"/>
<line x1="500" y1="620" x2="400" y2="676" class="arr" marker-end="url(#arrow)"/>

</svg>