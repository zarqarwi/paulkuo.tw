<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿哥拉廣場｜即時會議翻譯 — paulkuo.tw</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAFAF8;
  --bg-card: #FFFFFF;
  --bg-section: #F3F2EE;
  --text-primary: #1A1A1A;
  --text-secondary: #5A5A5A;
  --text-muted: #8A8A8A;
  --brand-navy: #1B2D4F;
  --brand-navy-light: #2A4470;
  --accent-ai: #2563EB;
  --accent-circular: #059669;
  --border: #E8E6E1;
  --border-light: #F0EDE8;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
  --radius: 12px;
  --font-body: 'DM Sans', 'Noto Sans TC', sans-serif;
  --font-cjk: 'Noto Sans TC', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text-primary);font-family:var(--font-body);display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%{transform:scale(.9);opacity:1}50%{transform:scale(1.15);opacity:.4}100%{transform:scale(.9);opacity:1}}

/* Header */
.header{padding:18px 32px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;background:rgba(250,250,248,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.header-left{display:flex;align-items:center;gap:14px}
.logo{width:42px;height:42px;border-radius:12px;background:var(--brand-navy);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff}
.header-title{font-size:20px;font-weight:700;color:var(--brand-navy);font-family:var(--font-cjk)}
.header-sub{font-size:13px;color:var(--text-muted);font-family:var(--font-body)}
.status{display:flex;align-items:center;gap:6px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted)}
.status-dot.pulse{animation:pulse 2s infinite}
.status-text{font-size:14px;font-weight:500;color:var(--text-muted)}

/* Controls */
.controls{padding:16px 32px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--bg)}
.lang-label{font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.lang-btns{display:flex;gap:4px;flex-wrap:wrap}
.lang-btn{padding:8px 16px;border-radius:100px;font-size:14px;border:1.5px solid var(--border);cursor:pointer;background:transparent;color:var(--text-secondary);font-family:var(--font-body);transition:all .2s;font-weight:500}
.lang-btn:hover{border-color:var(--brand-navy);color:var(--brand-navy)}
.lang-btn.tgt-active{background:var(--accent-circular);color:#fff;border-color:var(--accent-circular);font-weight:600}
.spacer{flex:1}
.btn-clear{padding:9px 20px;border-radius:100px;border:1.5px solid var(--border);background:transparent;color:var(--text-muted);font-size:14px;cursor:pointer;font-family:var(--font-body);transition:all .2s;font-weight:500}
.btn-clear:hover{border-color:var(--text-secondary);color:var(--text-secondary)}
.btn-main{padding:10px 28px;border-radius:100px;border:none;color:#fff;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:var(--font-body);transition:all .2s}
.btn-start{background:var(--brand-navy);box-shadow:0 2px 12px rgba(27,45,79,.2)}
.btn-start:hover{background:var(--brand-navy-light);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.btn-stop{background:#dc2626;box-shadow:0 2px 12px rgba(220,38,38,.2)}
.btn-stop:hover{opacity:.9}

/* Error */
.error-bar{padding:8px 28px;background:rgba(220,38,38,.06);border-bottom:1px solid rgba(220,38,38,.12);color:#dc2626;font-size:12px;display:none}
.error-bar.visible{display:block}

/* Content area */
.content{flex:1;min-height:0;overflow-y:auto;padding:24px 28px 80px 28px;position:relative}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px;color:var(--text-muted);position:relative;z-index:1}

/* Volume meter */
.vol-bar{height:3px;background:var(--border-light);border-radius:2px;overflow:hidden;margin:0 28px}
.vol-fill{height:100%;background:var(--accent-circular);width:0%;transition:width .1s}

/* Entry cards */
.entry{margin-bottom:14px;padding:24px 28px;position:relative;z-index:1;border-radius:var(--radius);background:var(--bg-card);border:1px solid var(--border-light);animation:fadeIn .3s ease-out;transition:box-shadow .2s}
.entry:hover{box-shadow:var(--shadow-sm)}
.entry-meta{font-size:13px;color:var(--accent-ai);font-family:monospace;margin-bottom:10px;font-weight:500}
.entry-lang{display:inline-block;padding:3px 9px;border-radius:4px;background:rgba(37,99,235,.08);font-size:11px;font-weight:600;color:var(--accent-ai);margin-left:6px}
.entry-original{font-size:16px;line-height:1.8;color:var(--text-primary);margin-bottom:10px;padding-left:12px;border-left:3px solid var(--brand-navy);font-family:var(--font-cjk)}
.entry-translated{font-size:16px;line-height:1.8;padding-left:12px;border-left:3px solid var(--accent-circular);min-height:20px;color:var(--accent-circular);font-family:var(--font-cjk);font-weight:500}
.shimmer{background:linear-gradient(90deg,var(--text-muted) 25%,var(--text-secondary) 50%,var(--text-muted) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* Recording indicator */
.rec-indicator{display:none;align-items:center;gap:6px;font-size:11px;color:#dc2626;font-weight:600}
.rec-indicator.visible{display:flex}
.rec-dot{width:8px;height:8px;border-radius:50%;background:#dc2626;animation:pulse 1.5s infinite}

/* Footer */
.footer{padding:14px 28px;border-top:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--text-muted);background:var(--bg)}
.footer label{display:flex;align-items:center;gap:6px;cursor:pointer}
.footer input[type=checkbox]{accent-color:var(--brand-navy)}

/* Mobile */
@media(max-width:640px){
  .header{padding:10px 16px}
  .header-title{font-size:14px}
  .header-sub{display:none}
  .logo{width:32px;height:32px;font-size:14px}
  .controls{padding:10px 16px;gap:8px}
  .lang-btn{padding:6px 10px;font-size:11px;min-height:36px;display:flex;align-items:center}
  .btn-clear{min-height:36px}
  .btn-main{min-height:40px;padding:8px 16px}
  .content{padding:12px 16px 60px 16px}
  .entry{padding:18px 20px}
  .entry-original,.entry-translated{font-size:15px}
  .footer{padding:8px 16px}
  .vol-bar{margin:0 16px}
}

/* Glossary panel */
.glossary-toggle{padding:9px 18px;border-radius:100px;border:1.5px solid var(--border);background:transparent;color:var(--text-secondary);font-size:14px;cursor:pointer;font-family:var(--font-body);transition:all .2s;font-weight:500}
.glossary-toggle:hover{border-color:var(--accent-ai);color:var(--accent-ai)}
.glossary-toggle.active{background:rgba(37,99,235,.08);border-color:var(--accent-ai);color:var(--accent-ai)}
.glossary-panel{display:none;padding:12px 28px;border-bottom:1px solid var(--border-light);background:var(--bg-section);animation:fadeIn .2s}
.glossary-panel.visible{display:block}
.glossary-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.glossary-input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:var(--font-body);background:var(--bg-card);color:var(--text-primary);outline:none;transition:border-color .2s}
.glossary-input:focus{border-color:var(--accent-ai)}
.glossary-input::placeholder{color:var(--text-muted)}
.glossary-rm{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.glossary-rm:hover{border-color:#dc2626;color:#dc2626;background:rgba(220,38,38,.06)}
.glossary-actions{display:flex;gap:8px;margin-top:8px}
.glossary-add{padding:4px 12px;border-radius:100px;border:1.5px dashed var(--border);background:transparent;color:var(--text-muted);font-size:11px;cursor:pointer;font-family:var(--font-body);transition:all .2s}
.glossary-add:hover{border-color:var(--accent-ai);color:var(--accent-ai)}
.glossary-hint{font-size:11px;color:var(--text-muted);margin-top:4px}

/* Summary button & modal */
.btn-summary{padding:9px 18px;border-radius:100px;border:1.5px solid var(--accent-circular);background:transparent;color:var(--accent-circular);font-size:14px;cursor:pointer;font-family:var(--font-body);transition:all .2s;font-weight:500}
.btn-summary:hover{background:var(--accent-circular);color:#fff}
.btn-summary:disabled{opacity:.4;cursor:not-allowed}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-overlay.visible{display:flex}
.modal-box{background:var(--bg-card);border-radius:16px;max-width:640px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:fadeIn .25s}
.modal-header{padding:20px 24px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border-light);position:sticky;top:0;background:var(--bg-card);border-radius:16px 16px 0 0;z-index:1}
.modal-title{font-size:20px;font-weight:700;color:var(--brand-navy);font-family:var(--font-cjk)}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg-section);color:var(--text-secondary);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:var(--border);color:var(--text-primary)}
.modal-body{padding:20px 24px}
.summary-section{margin-bottom:16px}
.summary-section h3{font-size:15px;font-weight:600;color:var(--accent-ai);margin-bottom:6px;font-family:var(--font-body)}
.summary-section p{font-size:16px;line-height:1.9;color:var(--text-primary);font-family:var(--font-cjk)}
.summary-section ul{padding-left:18px;margin:0}
.summary-section li{font-size:15px;line-height:1.9;color:var(--text-primary);font-family:var(--font-cjk);margin-bottom:2px}
.summary-cost{font-size:11px;color:var(--text-muted);text-align:right;padding:8px 24px 16px;border-top:1px solid var(--border-light)}
.summary-loading{display:flex;flex-direction:column;align-items:center;gap:12px;padding:40px 20px;color:var(--text-muted);font-size:14px}
.summary-loading .shimmer{font-size:14px}

/* Mobile additions */
@media(max-width:640px){
  .glossary-panel{padding:10px 16px}
  .glossary-row{flex-wrap:nowrap}
  .glossary-input{min-width:0;font-size:13px;padding:8px 10px}
  .modal-overlay{padding:10px}
  .modal-box{max-height:90vh}
  .modal-header{padding:16px 18px 10px}
  .modal-body{padding:16px 18px}
  .btn-summary{min-height:36px}
}

/* Modal action buttons */
.modal-actions{display:flex;gap:8px;padding:12px 24px 20px;border-top:1px solid var(--border-light);flex-wrap:wrap}
.modal-action-btn{padding:10px 20px;border-radius:100px;border:1.5px solid var(--border);background:transparent;color:var(--text-secondary);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font-body);transition:all .2s;display:flex;align-items:center;gap:5px}
.modal-action-btn:hover{border-color:var(--brand-navy);color:var(--brand-navy);background:rgba(27,45,79,.04)}
.modal-action-btn.copied{border-color:var(--accent-circular);color:var(--accent-circular)}
@media(max-width:640px){.modal-actions{padding:10px 18px 16px}.modal-action-btn{font-size:11px;padding:8px 12px}}

/* Same-language: hide redundant translation row */
.entry-translated.same-lang{display:none}

/* Matrix rain canvas */
.matrix-canvas{position:sticky;top:0;left:0;pointer-events:none;opacity:0;transition:opacity 1s ease;z-index:0;margin-bottom:-100%}
.matrix-canvas.active{opacity:1}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo">T</div>
    <div>
      <div class="header-title">阿哥拉廣場｜即時會議翻譯</div>
      <div class="header-sub">Whisper + Claude Haiku · 語音辨識 / 翻譯 / 會議紀錄</div>
    </div>
  </div>
  <div class="status">
    <div class="rec-indicator" id="recIndicator"><div class="rec-dot"></div><span>REC</span></div>
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">就緒</span>
  </div>
</div>
<div class="controls">
  <span class="lang-label">語言</span>
  <div class="lang-btns" id="tgtBtns"></div>
  <button class="glossary-toggle" id="btnGlossary" title="術語表設定">📖 術語表</button>
  <div class="spacer"></div>
  <button class="btn-summary" id="btnSummary" disabled title="產生會議摘要">📋 摘要</button>
  <button class="btn-clear" id="btnClear">清除</button>
  <button class="btn-main btn-start" id="btnToggle">🎙 開始</button>
</div>
<div class="vol-bar"><div class="vol-fill" id="volFill"></div></div>
<div class="glossary-panel" id="glossaryPanel">
  <div id="glossaryRows"></div>
  <div class="glossary-actions">
    <button class="glossary-add" id="btnAddTerm">+ 新增術語</button>
  </div>
  <div class="glossary-hint">輸入專有名詞和對應翻譯，翻譯和語音辨識時會優先使用這些術語。</div>
</div>
<div class="error-bar" id="errorBar"></div>
<div class="content" id="content">
  <canvas class="matrix-canvas" id="matrixCanvas"></canvas>
  <div class="empty" id="empty">
    <div style="font-size:48px;opacity:.25">🎙️</div>
    <div style="font-size:16px;text-align:center;line-height:1.8;color:var(--text-muted)">
      按「開始」後對著麥克風說話<br>
      <span style="font-size:12px">自動偵測語言（日/英/中/韓）· 支援所有瀏覽器</span>
    </div>
  </div>
</div>
<div class="footer">
  <span id="countLabel">0 筆紀錄</span>
  <label><input type="checkbox" id="autoScroll" checked> 自動捲動</label>
</div>
<div class="modal-overlay" id="summaryModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="summaryTitle">會議摘要</div>
      <button class="modal-close" id="btnModalClose">&times;</button>
    </div>
    <div class="modal-body" id="summaryBody">
      <div class="summary-loading"><div class="shimmer">正在產生摘要…</div></div>
    </div>
    <div class="summary-cost" id="summaryCost"></div>
    <div class="modal-actions" id="summaryActions" style="display:none">
      <button class="modal-action-btn" id="btnCopySummary">📋 複製</button>
      <button class="modal-action-btn" id="btnDownloadMd">💾 下載 Markdown</button>
      <button class="modal-action-btn" id="btnMailSummary">✉️ Email</button>
    </div>
  </div>
</div>
<script>
var WORKER_URL = "https://paulkuo-ticker.paul-4bf.workers.dev";
var LANGS = {
  "zh-TW": {label:"繁體中文", flag:"🇹🇼"},
  "en":    {label:"English",  flag:"🇺🇸"},
  "ja":    {label:"日本語",   flag:"🇯🇵"},
  "zh-CN": {label:"简体中文", flag:"🇨🇳"},
  "ko":    {label:"한국어",   flag:"🇰🇷"}
};
var LANG_FLAGS = {"ja":"🇯🇵","en":"🇺🇸","zh-TW":"🇹🇼","zh-CN":"🇨🇳","ko":"🇰🇷","chinese":"🇨🇳","japanese":"🇯🇵","english":"🇺🇸","korean":"🇰🇷"};

var tgtLang = "zh-TW";
var recording = false;
var mediaRecorder = null;
var audioContext = null;
var analyser = null;
var silenceTimer = null;
var chunks = [];
var nextId = 0;
var allEntries = [];

// Tuning
var SILENCE_THRESHOLD = 0.015;  // RMS below this = silence
var SILENCE_DURATION = 1500;    // ms of silence before sending
var MIN_CHUNK_MS = 800;         // ignore chunks shorter than this
var chunkStartTime = 0;
var hasSound = false;
var autoSendInterval = null;

function getEl(id) { return document.getElementById(id); }
function escHtml(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

// Status
function setStatus(type) {
  var dot = getEl("statusDot"), txt = getEl("statusText"), rec = getEl("recIndicator");
  var m = {
    "ready":     ["就緒",       "var(--text-muted)", false],
    "listening": ["聆聽中",     "#059669",           true],
    "sending":   ["辨識中…",    "var(--accent-ai)",  true],
    "error":     ["錯誤",       "#dc2626",           false]
  };
  var v = m[type] || m["ready"];
  txt.textContent = v[0]; txt.style.color = v[1]; dot.style.background = v[1];
  if (v[2]) { dot.classList.add("pulse"); } else { dot.classList.remove("pulse"); }
  rec.classList.toggle("visible", type === "listening" || type === "sending");
}

function showError(msg) { var b = getEl("errorBar"); b.textContent = "⚠ " + msg; b.classList.add("visible"); }
function hideError() { getEl("errorBar").classList.remove("visible"); }

// Target language buttons (no source selection needed — Whisper auto-detects)
function renderLangs() {
  var tc = getEl("tgtBtns");
  tc.innerHTML = "";
  Object.keys(LANGS).forEach(function(k) {
    var lang = LANGS[k];
    var btn = document.createElement("button");
    btn.className = "lang-btn" + (k === tgtLang ? " tgt-active" : "");
    btn.textContent = lang.flag + " " + lang.label;
    btn.addEventListener("click", function() { tgtLang = k; renderLangs(); });
    tc.appendChild(btn);
  });
}

// Volume meter
function startVolumeMeter(stream) {
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  var source = audioContext.createMediaStreamSource(stream);
  analyser = audioContext.createAnalyser();
  analyser.fftSize = 512;
  source.connect(analyser);
  var dataArray = new Float32Array(analyser.fftSize);
  var volEl = getEl("volFill");

  function tick() {
    if (!recording) { volEl.style.width = "0%"; return; }
    analyser.getFloatTimeDomainData(dataArray);
    var sum = 0;
    for (var i = 0; i < dataArray.length; i++) sum += dataArray[i] * dataArray[i];
    var rms = Math.sqrt(sum / dataArray.length);
    volEl.style.width = Math.min(100, rms * 500) + "%";

    // Silence detection
    if (rms < SILENCE_THRESHOLD) {
      if (!silenceTimer && (Date.now() - chunkStartTime) > MIN_CHUNK_MS) {
        silenceTimer = setTimeout(function() { sendChunks(); }, SILENCE_DURATION);
      }
    } else {
      if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
      hasSound = true;
    }
    requestAnimationFrame(tick);
  }
  tick();
}

// Recording
function startRecording() {
  navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
    recording = true;
    updateToggle();
    setStatus("listening");
    hideError();
    startMatrix();

    // Use webm/opus if available, fallback to mp4/aac (iOS Safari)
    var mimeType = "audio/webm;codecs=opus";
    if (!MediaRecorder.isTypeSupported(mimeType)) {
      mimeType = "audio/mp4";
      if (!MediaRecorder.isTypeSupported(mimeType)) {
        mimeType = ""; // let browser decide
      }
    }

    var options = mimeType ? { mimeType: mimeType } : {};
    mediaRecorder = new MediaRecorder(stream, options);
    chunks = [];
    chunkStartTime = Date.now();

    mediaRecorder.ondataavailable = function(e) {
      console.log('[translator] data available:', e.data ? e.data.size : 0, 'bytes');
      if (e.data && e.data.size > 0) chunks.push(e.data);
    };

    mediaRecorder.onstop = function() {
      console.log('[translator] recorder stopped, chunks:', chunks.length, 'hasSound:', hasSound);
      // Send if we have data
      if (chunks.length > 0) {
        var blob = new Blob(chunks, { type: mediaRecorder.mimeType || "audio/webm" });
        console.log('[translator] sending blob:', blob.size, 'bytes');
        sendAudio(blob);
      }
      chunks = [];
      chunkStartTime = Date.now();
      hasSound = false;

      // Restart if still recording
      if (recording) {
        try { mediaRecorder.start(3000); } catch(e) { console.error('[translator] restart failed:', e); }
      }
    };

    mediaRecorder.start(3000); // timeslice: fire ondataavailable every 3s
    startVolumeMeter(stream);
    // Keep reference to stream for cleanup
    mediaRecorder._stream = stream;
    console.log('[translator] recording started, mimeType:', mediaRecorder.mimeType);

    // Fallback: auto-send every 5 seconds if silence detection doesn't trigger
    autoSendInterval = setInterval(function() {
      if (recording && chunks.length > 0 && mediaRecorder && mediaRecorder.state === 'recording') {
        console.log('[translator] auto-send triggered, chunks:', chunks.length);
        mediaRecorder.stop();
      }
    }, 5000);
  }).catch(function(e) {
    showError("無法取得麥克風: " + e.message);
    setStatus("error");
  });
}

function sendChunks() {
  silenceTimer = null;
  if (mediaRecorder && mediaRecorder.state === "recording") {
    mediaRecorder.stop(); // triggers onstop → sends audio → restarts
  }
}

function stopRecording() {
  recording = false;
  if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
  if (autoSendInterval) { clearInterval(autoSendInterval); autoSendInterval = null; }
  if (mediaRecorder) {
    if (mediaRecorder.state === "recording") {
      mediaRecorder.stop(); // will trigger onstop, but recording=false so won't restart
    }
    // Stop all tracks
    if (mediaRecorder._stream) {
      mediaRecorder._stream.getTracks().forEach(function(t) { t.stop(); });
    }
    mediaRecorder = null;
  }
  if (audioContext) { audioContext.close(); audioContext = null; }
  getEl("volFill").style.width = "0%";
  setStatus("ready");
  stopMatrix();
  updateToggle();
}

// sendAudio replaced by glossary-aware version below
function updateEntry(id, original, translated, detectedLang) {
  var entry = allEntries.find(function(e) { return e.id === id; });
  if (entry) { entry.original = original; entry.translated = translated; entry.detectedLang = detectedLang; }

  var metaEl = getEl("entry-" + id);
  if (!metaEl) return;
  var flag = LANG_FLAGS[detectedLang] || "🌐";
  var tgtFlag = (LANGS[entry.tgt] || {}).flag || "";
  var ts = entry.ts;
  metaEl.querySelector(".entry-meta").innerHTML = ts + " · " + flag + " → " + tgtFlag +
    (detectedLang ? '<span class="entry-lang">' + detectedLang + '</span>' : '');
  getEl("orig-" + id).textContent = original;
  var transEl = getEl("trans-" + id);
  if (translated && translated !== original) {
    transEl.textContent = translated;
    transEl.classList.remove("same-lang");
  } else {
    transEl.textContent = "";
    transEl.classList.add("same-lang");
  }
  scrollBottom();
}

// UI helpers
function clearAll() {
  allEntries = []; nextId = 0;
  getEl("content").innerHTML = '<div class="empty" id="empty"><div style="font-size:48px;opacity:.25">🎙️</div><div style="font-size:16px;text-align:center;line-height:1.8;color:var(--text-muted)">按「開始」後對著麥克風說話<br><span style="font-size:12px">自動偵測語言（日/英/中/韓）· 支援所有瀏覽器</span></div></div>';
  updateCount();
}
function updateCount() { getEl("countLabel").textContent = allEntries.length + " 筆紀錄"; }
function scrollBottom() {
  if (getEl("autoScroll").checked) {
    var c = getEl("content");
    requestAnimationFrame(function() { c.scrollTop = c.scrollHeight; });
  }
}
function updateToggle() {
  var btn = getEl("btnToggle");
  if (recording) { btn.className = "btn-main btn-stop"; btn.textContent = "■ 停止"; }
  else { btn.className = "btn-main btn-start"; btn.textContent = "🎙 開始"; }
}

// Event listeners
getEl("btnToggle").addEventListener("click", function() {
  if (recording) stopRecording(); else startRecording();
});
getEl("btnClear").addEventListener("click", clearAll);

// Init
renderLangs();

// === Glossary Management ===
var glossary = [];

function renderGlossary() {
  var container = getEl("glossaryRows");
  container.innerHTML = "";
  glossary.forEach(function(g, i) {
    var row = document.createElement("div");
    row.className = "glossary-row";
    row.innerHTML = '<input class="glossary-input" placeholder="原文術語" value="' + escHtml(g.term) + '" data-idx="' + i + '" data-field="term">' +
      '<span style="color:var(--text-muted);font-size:12px">→</span>' +
      '<input class="glossary-input" placeholder="翻譯" value="' + escHtml(g.translation) + '" data-idx="' + i + '" data-field="translation">' +
      '<button class="glossary-rm" data-idx="' + i + '">&times;</button>';
    container.appendChild(row);
  });
  // Bind events
  container.querySelectorAll(".glossary-input").forEach(function(inp) {
    inp.addEventListener("input", function() {
      var idx = parseInt(this.getAttribute("data-idx"));
      var field = this.getAttribute("data-field");
      if (glossary[idx]) glossary[idx][field] = this.value;
    });
  });
  container.querySelectorAll(".glossary-rm").forEach(function(btn) {
    btn.addEventListener("click", function() {
      glossary.splice(parseInt(this.getAttribute("data-idx")), 1);
      renderGlossary();
    });
  });
}

function getCleanGlossary() {
  return glossary.filter(function(g) { return g.term.trim() && g.translation.trim(); });
}

// Toggle glossary panel
getEl("btnGlossary").addEventListener("click", function() {
  var panel = getEl("glossaryPanel");
  var btn = getEl("btnGlossary");
  panel.classList.toggle("visible");
  btn.classList.toggle("active");
  if (panel.classList.contains("visible") && glossary.length === 0) {
    glossary.push({term:"", translation:""});
    renderGlossary();
  }
});

// Add term
getEl("btnAddTerm").addEventListener("click", function() {
  glossary.push({term:"", translation:""});
  renderGlossary();
  var inputs = getEl("glossaryRows").querySelectorAll(".glossary-input");
  if (inputs.length > 0) inputs[inputs.length - 2].focus();
});

// === sendAudio (with glossary support) ===
function sendAudio(blob) {
  var id = ++nextId;
  var ts = new Date().toLocaleTimeString("zh-TW", {hour:"2-digit",minute:"2-digit",second:"2-digit"});
  var entry = {id:id, original:"", translated:null, detectedLang:"", ts:ts, tgt:tgtLang};
  allEntries.push(entry);

  var emp = getEl("empty");
  if (emp) emp.remove();

  var div = document.createElement("div");
  div.className = "entry";
  div.id = "entry-" + id;
  div.innerHTML = '<div class="entry-meta">' + ts + ' · <span class="shimmer">辨識中…</span></div>' +
    '<div class="entry-original" id="orig-' + id + '"><span class="shimmer">語音辨識處理中</span></div>' +
    '<div class="entry-translated" id="trans-' + id + '"><span class="shimmer">翻譯中...</span></div>';
  getEl("content").appendChild(div);
  updateCount();
  scrollBottom();

  setStatus("sending");

  var form = new FormData();
  form.append("audio", blob, "audio.webm");
  form.append("targetLang", tgtLang);
  var cg = getCleanGlossary();
  if (cg.length > 0) form.append("glossary", JSON.stringify(cg));

  console.log('[translator] POSTing to /stt, blob size:', blob.size, 'glossary:', cg.length);
  fetch(WORKER_URL + "/stt", { method: "POST", body: form })
    .then(function(r) { console.log('[translator] /stt response:', r.status); return r.json(); })
    .then(function(d) {
      if (d.error) {
        updateEntry(id, "\u26a0 " + d.error, "", "");
        return;
      }
      if (!d.original) {
        var el = getEl("entry-" + id);
        if (el) el.remove();
        allEntries = allEntries.filter(function(e) { return e.id !== id; });
        updateCount();
        return;
      }
      updateEntry(id, d.original, d.translated, d.detectedLang);
      if (recording) setStatus("listening");
      // Enable summary button when we have entries
      getEl("btnSummary").disabled = false;
    })
    .catch(function(e) {
      updateEntry(id, "\u26a0 連線錯誤: " + e.message, "", "");
      if (recording) setStatus("listening");
    });
};

// === Summary ===
getEl("btnSummary").addEventListener("click", function() {
  if (allEntries.length === 0) return;

  // Build transcript text
  var lines = allEntries.map(function(e) {
    var src = e.original || "";
    var tr = e.translated || "";
    if (!src) return null;
    return "[" + e.ts + "] " + src + (tr && tr !== src ? "\n(" + tr + ")" : "");
  }).filter(Boolean);

  if (lines.length === 0) return;

  var transcript = lines.join("\n\n");
  var modal = getEl("summaryModal");
  var body = getEl("summaryBody");
  var cost = getEl("summaryCost");
  var title = getEl("summaryTitle");

  title.textContent = "會議摘要";
  body.innerHTML = '<div class="summary-loading"><div class="shimmer">正在產生摘要…</div><div style="font-size:12px">分析 ' + allEntries.length + ' 筆翻譯紀錄</div></div>';
  cost.textContent = "";
  getEl("summaryActions").style.display = "none";
  modal.classList.add("visible");

  fetch(WORKER_URL + "/summarize", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      text: transcript,
      lang: tgtLang,
      glossary: getCleanGlossary()
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.error) {
      body.innerHTML = '<div style="color:#dc2626;padding:20px">\u26a0 ' + escHtml(d.error) + '</div>';
      return;
    }
    title.textContent = d.title || "會議摘要";
    lastSummaryData = d;
    getEl("summaryActions").style.display = "flex";
    var h = '';
    if (d.summary) {
      h += '<div class="summary-section"><h3>📝 摘要</h3><p>' + escHtml(d.summary).replace(/\n/g, '<br>') + '</p></div>';
    }
    if (d.keyPoints && d.keyPoints.length > 0) {
      h += '<div class="summary-section"><h3>💡 重點</h3><ul>' + d.keyPoints.map(function(p) { return '<li>' + escHtml(p) + '</li>'; }).join('') + '</ul></div>';
    }
    if (d.actionItems && d.actionItems.length > 0) {
      h += '<div class="summary-section"><h3>✅ 待辦事項</h3><ul>' + d.actionItems.map(function(a) { return '<li>' + escHtml(a) + '</li>'; }).join('') + '</ul></div>';
    }
    if (d.decisions && d.decisions.length > 0) {
      h += '<div class="summary-section"><h3>🔖 決議</h3><ul>' + d.decisions.map(function(a) { return '<li>' + escHtml(a) + '</li>'; }).join('') + '</ul></div>';
    }
    body.innerHTML = h || '<div style="padding:20px;color:var(--text-muted)">無法產生有效摘要</div>';
    if (d.costUSD !== undefined) {
      cost.textContent = "API cost: $" + d.costUSD.toFixed(6);
    }
  })
  .catch(function(e) {
    body.innerHTML = '<div style="color:#dc2626;padding:20px">\u26a0 連線錯誤: ' + escHtml(e.message) + '</div>';
  });
});

// Close modal
getEl("btnModalClose").addEventListener("click", function() {
  getEl("summaryModal").classList.remove("visible");
});
getEl("summaryModal").addEventListener("click", function(e) {
  if (e.target === this) this.classList.remove("visible");
});

// Update summary button state when entries change
var _origClearAll = clearAll;
clearAll = function() {
  _origClearAll();
  getEl("btnSummary").disabled = true;
};


// === Summary export: last summary data ===
var lastSummaryData = null;

function buildSummaryMarkdown(d) {
  var md = '# ' + (d.title || 'Meeting Summary') + '\n\n';
  var now = new Date();
  md += '*' + now.toLocaleDateString('zh-TW') + ' ' + now.toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit'}) + '*\n\n';
  if (d.summary) {
    md += '## Summary\n\n' + d.summary + '\n\n';
  }
  if (d.keyPoints && d.keyPoints.length > 0) {
    md += '## Key Points\n\n';
    d.keyPoints.forEach(function(p) { md += '- ' + p + '\n'; });
    md += '\n';
  }
  if (d.actionItems && d.actionItems.length > 0) {
    md += '## Action Items\n\n';
    d.actionItems.forEach(function(a) { md += '- [ ] ' + a + '\n'; });
    md += '\n';
  }
  if (d.decisions && d.decisions.length > 0) {
    md += '## Decisions\n\n';
    d.decisions.forEach(function(a) { md += '- ' + a + '\n'; });
    md += '\n';
  }
  return md;
}

function buildSummaryPlainText(d) {
  var t = (d.title || 'Meeting Summary') + '\n';
  t += new Array((d.title || 'Meeting Summary').length + 1).join('=') + '\n\n';
  if (d.summary) t += d.summary + '\n\n';
  if (d.keyPoints && d.keyPoints.length > 0) {
    t += '--- Key Points ---\n';
    d.keyPoints.forEach(function(p) { t += '\u2022 ' + p + '\n'; });
    t += '\n';
  }
  if (d.actionItems && d.actionItems.length > 0) {
    t += '--- Action Items ---\n';
    d.actionItems.forEach(function(a) { t += '\u2022 ' + a + '\n'; });
    t += '\n';
  }
  if (d.decisions && d.decisions.length > 0) {
    t += '--- Decisions ---\n';
    d.decisions.forEach(function(a) { t += '\u2022 ' + a + '\n'; });
    t += '\n';
  }
  return t;
}

// Copy
getEl("btnCopySummary").addEventListener("click", function() {
  if (!lastSummaryData) return;
  var text = buildSummaryPlainText(lastSummaryData);
  navigator.clipboard.writeText(text).then(function() {
    var btn = getEl("btnCopySummary");
    btn.classList.add("copied");
    btn.textContent = "\u2705 \u5df2\u8907\u88fd";
    setTimeout(function() { btn.classList.remove("copied"); btn.textContent = "\ud83d\udccb \u8907\u88fd"; }, 2000);
  });
});

// Download Markdown
getEl("btnDownloadMd").addEventListener("click", function() {
  if (!lastSummaryData) return;
  var md = buildSummaryMarkdown(lastSummaryData);
  var dateStr = new Date().toISOString().slice(0, 10);
  var safeTitle = (lastSummaryData.title || 'meeting').replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g, '_').slice(0, 30);
  var filename = dateStr + '_' + safeTitle + '.md';
  var blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

// Email via mailto
getEl("btnMailSummary").addEventListener("click", function() {
  if (!lastSummaryData) return;
  var subject = encodeURIComponent(lastSummaryData.title || 'Meeting Summary');
  var body = encodeURIComponent(buildSummaryPlainText(lastSummaryData));
  window.open('mailto:?subject=' + subject + '&body=' + body, '_blank');
});


// === Matrix Digital Rain ===
var matrixCanvas = getEl("matrixCanvas");
var matrixCtx = matrixCanvas.getContext("2d");
var matrixActive = false;
var matrixRAF = null;
var matrixColumns = [];
var matrixCharSize = 15;
var matrixChars = "\u30A2\u30A4\u30A6\u30A8\u30AA\u30AB\u30AD\u30AF\u30B1\u30B3\u30B5\u30B7\u30B9\u30BB\u30BD\u30BF\u30C1\u30C4\u30C6\u30C8\u30CA\u30CB\u30CC\u30CD\u30CE\u30CF\u30D2\u30D5\u30D8\u30DB\u30DE\u30DF\u30E0\u30E1\u30E2\u30E4\u30E6\u30E8\u30E9\u30EA\u30EB\u30EC\u30ED\u30EF\u30F3ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&=";

function positionMatrixCanvas() {
  var c = getEl("content");
  matrixCanvas.width = c.clientWidth;
  matrixCanvas.height = c.clientHeight;
  matrixCanvas.style.width = c.clientWidth + "px";
  matrixCanvas.style.height = c.clientHeight + "px";
}

function initMatrix() {
  positionMatrixCanvas();
  var cols = Math.floor(matrixCanvas.width / matrixCharSize);
  matrixColumns = [];
  for (var i = 0; i < cols; i++) {
    matrixColumns.push(Math.floor(Math.random() * matrixCanvas.height / matrixCharSize));
  }
}

function drawMatrix() {
  if (!matrixActive) return;
  // Semi-transparent bg overlay to create trailing effect
  matrixCtx.fillStyle = "rgba(250, 250, 248, 0.08)";
  matrixCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
  matrixCtx.font = "bold " + matrixCharSize + "px monospace";

  for (var i = 0; i < matrixColumns.length; i++) {
    var ch = matrixChars[Math.floor(Math.random() * matrixChars.length)];
    var x = i * matrixCharSize;
    var y = matrixColumns[i] * matrixCharSize;

    // Main character: green with decent visibility
    matrixCtx.fillStyle = "rgba(5, 150, 105, 0.13)";
    matrixCtx.fillText(ch, x, y);

    // Random bright flash on some chars
    if (Math.random() > 0.95) {
      matrixCtx.fillStyle = "rgba(5, 150, 105, 0.3)";
      matrixCtx.fillText(ch, x, y);
    }

    // Reset column or advance
    if (y > matrixCanvas.height && Math.random() > 0.975) {
      matrixColumns[i] = 0;
    } else {
      matrixColumns[i]++;
    }
  }
  matrixRAF = requestAnimationFrame(drawMatrix);
}

function startMatrix() {
  if (matrixActive) return;
  matrixActive = true;
  initMatrix();
  matrixCanvas.classList.add("active");
  drawMatrix();
}

function stopMatrix() {
  matrixActive = false;
  matrixCanvas.classList.remove("active");
  if (matrixRAF) { cancelAnimationFrame(matrixRAF); matrixRAF = null; }
  setTimeout(function() {
    if (!matrixActive) matrixCtx.clearRect(0, 0, matrixCanvas.width, matrixCanvas.height);
  }, 1100);
}

window.addEventListener("resize", function() {
  if (matrixActive) { positionMatrixCanvas(); initMatrix(); }
});

</script>
