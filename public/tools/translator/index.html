<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>即時會議翻譯</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{height:100vh;background:linear-gradient(145deg,#0a0a0f,#111127,#0d1117);color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;display:flex;flex-direction:column}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pulse{0%{transform:scale(.9);opacity:1}50%{transform:scale(1.15);opacity:.4}100%{transform:scale(.9);opacity:1}}
.header{padding:16px 24px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.02)}
.header-left{display:flex;align-items:center;gap:12px}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff}
.status{display:flex;align-items:center;gap:6px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#6b7280}
.status-dot.pulse{animation:pulse 2s infinite}
.status-text{font-size:12px;font-weight:500;color:#6b7280}
.controls{padding:14px 24px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:rgba(255,255,255,.01)}
.lang-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.lang-btns{display:flex;gap:4px;flex-wrap:wrap}
.lang-btn{padding:5px 10px;border-radius:6px;font-size:12px;border:none;cursor:pointer;background:rgba(255,255,255,.05);color:#94a3b8;font-family:inherit}
.lang-btn:hover{background:rgba(255,255,255,.1)}
.lang-btn.src-active{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-weight:600}
.lang-btn.tgt-active{background:linear-gradient(135deg,#059669,#10b981);color:#fff;font-weight:600}
.spacer{flex:1}
.btn-clear{padding:6px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:transparent;color:#64748b;font-size:12px;cursor:pointer;font-family:inherit}
.btn-main{padding:8px 20px;border-radius:8px;border:none;color:#fff;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit}
.btn-start{background:linear-gradient(135deg,#6366f1,#8b5cf6);box-shadow:0 0 20px rgba(99,102,241,.3)}
.btn-stop{background:linear-gradient(135deg,#dc2626,#ef4444);box-shadow:0 0 20px rgba(239,68,68,.3)}
.error-bar{padding:8px 24px;background:rgba(239,68,68,.1);border-bottom:1px solid rgba(239,68,68,.2);color:#fca5a5;font-size:12px;display:none}
.error-bar.visible{display:block}
.content{flex:1;overflow-y:auto;padding:16px 24px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px;color:#4b5563}
.entry{margin-bottom:12px;padding:12px 16px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);animation:fadeIn .3s ease-out}
.entry-meta{font-size:10px;color:#6366f1;font-family:monospace;margin-bottom:8px}
.entry-original{font-size:14px;line-height:1.7;color:#cbd5e1;margin-bottom:8px;padding-left:10px;border-left:2px solid #6366f1}
.entry-translated{font-size:14px;line-height:1.7;padding-left:10px;border-left:2px solid #10b981;min-height:20px;color:#a7f3d0}
.shimmer{background:linear-gradient(90deg,#64748b 25%,#94a3b8 50%,#64748b 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.interim{padding:12px 16px;border-radius:10px;background:rgba(99,102,241,.05);border:1px dashed rgba(99,102,241,.2)}
.interim-text{font-size:14px;color:#818cf8;padding-left:10px;border-left:2px dashed #6366f1;opacity:.7}
.cursor-blink{display:inline-block;width:2px;height:16px;background:#818cf8;margin-left:2px;vertical-align:middle;animation:blink 1s infinite}
.footer{padding:10px 24px;border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#4b5563}
.footer label{display:flex;align-items:center;gap:6px;cursor:pointer}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo">T</div>
    <div>
      <div style="font-size:15px;font-weight:600">即時會議翻譯</div>
      <div style="font-size:11px;color:#64748b;font-family:monospace">Web Speech API + Claude Haiku (Worker)</div>
    </div>
  </div>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">就緒</span>
  </div>
</div>
<div class="controls">
  <span class="lang-label">聽</span>
  <div class="lang-btns" id="srcBtns"></div>
  <span style="font-size:18px;color:#4b5563">→</span>
  <span class="lang-label">譯</span>
  <div class="lang-btns" id="tgtBtns"></div>
  <div class="spacer"></div>
  <button class="btn-clear" id="btnClear">清除</button>
  <button class="btn-main btn-start" id="btnToggle">▶ 開始翻譯</button>
</div>
<div class="error-bar" id="errorBar"></div>
<div class="content" id="content">
  <div class="empty" id="empty">
    <div style="font-size:48px;opacity:.3">🎙️</div>
    <div style="font-size:14px;text-align:center;line-height:1.8">按「開始翻譯」後對著麥克風說話<br><span id="langHint" style="font-size:12px;color:#374151"></span></div>
  </div>
</div>
<div class="footer">
  <span id="countLabel">0 筆翻譯</span>
  <label><input type="checkbox" id="autoScroll" checked style="accent-color:#6366f1"> 自動捲動</label>
</div>
<script>
// === Config ===
var WORKER_URL = "https://paulkuo-ticker.paul-4bf.workers.dev";
var LANGS={"ja":{label:"日本語",flag:"🇯🇵",code:"ja-JP"},"zh-TW":{label:"繁體中文",flag:"🇹🇼",code:"zh-TW"},"en":{label:"English",flag:"🇺🇸",code:"en-US"},"zh-CN":{label:"简体中文",flag:"🇨🇳",code:"zh-CN"},"ko":{label:"한국어",flag:"🇰🇷",code:"ko-KR"}};
var srcLang="ja",tgtLang="zh-TW",listening=false,recognition=null,restartTimer=null,nextId=0,allEntries=[];
function getEl(id){return document.getElementById(id)}
function escHtml(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function setStatus(type){var dot=getEl("statusDot"),txt=getEl("statusText");var m={"ready":["就緒","#6b7280",false],"listening":["聆聽中","#22c55e",true],"no-speech":["等待語音…","#eab308",true],"error":["錯誤","#ef4444",false]};var v=m[type]||m["ready"];txt.textContent=v[0];txt.style.color=v[1];dot.style.background=v[1];if(v[2])dot.classList.add("pulse");else dot.classList.remove("pulse")}
function showError(msg){var b=getEl("errorBar");b.textContent="⚠ "+msg;b.classList.add("visible")}
function hideError(){getEl("errorBar").classList.remove("visible")}
function renderLangs(){var sc=getEl("srcBtns"),tc=getEl("tgtBtns");sc.innerHTML="";tc.innerHTML="";var keys=Object.keys(LANGS);for(var i=0;i<keys.length;i++){(function(k){var lang=LANGS[k];var btn=document.createElement("button");btn.className="lang-btn"+(k===srcLang?" src-active":"");btn.textContent=lang.flag+" "+lang.label;btn.addEventListener("click",function(){var wasOn=listening;if(wasOn)stopRec();srcLang=k;if(srcLang===tgtLang){var alt=Object.keys(LANGS).filter(function(x){return x!==srcLang});tgtLang=alt[0]}renderLangs();updateHint();if(wasOn)setTimeout(startRec,200)});sc.appendChild(btn)})(keys[i])}for(var j=0;j<keys.length;j++){(function(k){if(k===srcLang)return;var lang=LANGS[k];var btn=document.createElement("button");btn.className="lang-btn"+(k===tgtLang?" tgt-active":"");btn.textContent=lang.flag+" "+lang.label;btn.addEventListener("click",function(){tgtLang=k;renderLangs();updateHint()});tc.appendChild(btn)})(keys[j])}}
function updateHint(){var h=getEl("langHint");if(h)h.textContent="支援 "+LANGS[srcLang].label+" → "+LANGS[tgtLang].label+" 即時翻譯"}
function addEntry(text){var id=++nextId;var ts=new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit"});var entry={id:id,original:text,translated:null,done:false,ts:ts,src:srcLang,tgt:tgtLang};allEntries.push(entry);var emp=getEl("empty");if(emp)emp.remove();var div=document.createElement("div");div.className="entry";div.id="entry-"+id;div.innerHTML='<div class="entry-meta">'+ts+" · "+(LANGS[entry.src]||{}).flag+" → "+(LANGS[entry.tgt]||{}).flag+'</div><div class="entry-original">'+escHtml(text)+'</div><div class="entry-translated" id="trans-'+id+'"><span class="shimmer">翻譯中...</span></div>';getEl("content").appendChild(div);updateCount();scrollBottom();doTranslate(entry)}
function updateTrans(entry){var el=getEl("trans-"+entry.id);if(!el)return;el.textContent=entry.translated||"";scrollBottom()}
function showInterim(text){var box=getEl("interimBox");if(!text){if(box)box.remove();return}if(!box){box=document.createElement("div");box.id="interimBox";box.className="interim";getEl("content").appendChild(box)}box.innerHTML='<div class="interim-text">'+escHtml(text)+'<span class="cursor-blink"></span></div>';scrollBottom()}
function clearAll(){allEntries=[];nextId=0;getEl("content").innerHTML='<div class="empty" id="empty"><div style="font-size:48px;opacity:.3">🎙️</div><div style="font-size:14px;text-align:center;line-height:1.8">按「開始翻譯」後對著麥克風說話<br><span id="langHint" style="font-size:12px;color:#374151"></span></div></div>';updateHint();updateCount()}
function updateCount(){getEl("countLabel").textContent=allEntries.length+" 筆翻譯"}
function scrollBottom(){if(getEl("autoScroll").checked){var c=getEl("content");requestAnimationFrame(function(){c.scrollTop=c.scrollHeight})}}

// === Translation via Cloudflare Worker ===
function doTranslate(entry){
  fetch(WORKER_URL + "/translate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      text: entry.original,
      sourceLang: entry.src,
      targetLang: entry.tgt
    })
  })
  .then(function(r){
    if(!r.ok) return r.json().then(function(d){throw new Error(d.error||"HTTP "+r.status)});
    return r.json();
  })
  .then(function(d){
    entry.translated = d.translated || "(空白)";
    entry.done = true;
    updateTrans(entry);
  })
  .catch(function(e){
    entry.translated = "⚠ " + e.message;
    entry.done = true;
    updateTrans(entry);
  });
}

// === Speech Recognition ===
function startRec(){var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){showError("此瀏覽器不支援 Web Speech API");return}recognition=new SR();recognition.continuous=true;recognition.interimResults=true;recognition.lang=LANGS[srcLang].code;recognition.maxAlternatives=1;recognition.onstart=function(){setStatus("listening");hideError()};recognition.onresult=function(ev){var interim="";for(var i=ev.resultIndex;i<ev.results.length;i++){var t=ev.results[i][0].transcript;if(ev.results[i].isFinal){var tr=t.trim();if(tr){showInterim("");addEntry(tr)}}else{interim+=t}}if(interim)showInterim(interim)};recognition.onerror=function(ev){if(ev.error==="no-speech"){setStatus("no-speech");return}if(ev.error==="aborted")return;showError("語音辨識錯誤: "+ev.error);setStatus("error")};recognition.onend=function(){if(listening){restartTimer=setTimeout(function(){if(listening)try{recognition.start()}catch(e){}},300)}else{setStatus("ready");showInterim("")}};try{recognition.start();listening=true;updateToggle()}catch(e){showError("無法啟動: "+e.message)}}
function stopRec(){listening=false;if(restartTimer)clearTimeout(restartTimer);if(recognition){recognition.stop();recognition=null}setStatus("ready");showInterim("");updateToggle()}
function updateToggle(){var btn=getEl("btnToggle");if(listening){btn.className="btn-main btn-stop";btn.textContent="■ 停止"}else{btn.className="btn-main btn-start";btn.textContent="▶ 開始翻譯"}}
getEl("btnToggle").addEventListener("click",function(){if(listening)stopRec();else startRec()});
getEl("btnClear").addEventListener("click",clearAll);
renderLangs();updateHint();
</script>
</body>
</html>
