<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Noto Sans TC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&amp;display=swap');
    </style>
    <marker id="arrowRight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#999"/>
    </marker>
    <marker id="arrowLeft" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#999"/>
    </marker>
    <marker id="arrowUp" markerWidth="6" markerHeight="8" refX="3" refY="0" orient="auto">
      <path d="M0,8 L3,0 L6,8" fill="#999"/>
    </marker>
    <marker id="arrowDown" markerWidth="6" markerHeight="8" refX="3" refY="8" orient="auto">
      <path d="M0,0 L3,8 L6,0" fill="#999"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a">全球 AI 能力框架定位圖</text>
  <text x="400" y="66" text-anchor="middle" font-size="13" fill="#888">AI Capability Framework Positioning Matrix</text>

  <!-- Quadrant backgrounds -->
  <rect x="120" y="90" width="290" height="215" fill="#f0f0f0" rx="4"/>
  <rect x="410" y="90" width="290" height="215" fill="#e8f4f8" rx="4"/>
  <rect x="120" y="305" width="290" height="215" fill="#fff3e0" rx="4"/>
  <rect x="410" y="305" width="290" height="215" fill="#fff" rx="4" stroke="#ff6b35" stroke-width="2.5" stroke-dasharray="8,4"/>

  <!-- Axes -->
  <line x1="120" y1="305" x2="700" y2="305" stroke="#666" stroke-width="1.5"/>
  <line x1="410" y1="90" x2="410" y2="520" stroke="#666" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="265" y="545" text-anchor="middle" font-size="15" font-weight="700" fill="#555">素養 Literacy</text>
  <text x="555" y="545" text-anchor="middle" font-size="15" font-weight="700" fill="#555">績效 Performance</text>
  <line x1="350" y1="530" x2="180" y2="530" stroke="#999" stroke-width="1.2" marker-start="url(#arrowLeft)"/>
  <line x1="470" y1="530" x2="640" y2="530" stroke="#999" stroke-width="1.2" marker-end="url(#arrowRight)"/>

  <text x="60" y="200" text-anchor="middle" font-size="15" font-weight="700" fill="#555" transform="rotate(-90, 60, 200)">宏觀 Macro</text>
  <text x="60" y="415" text-anchor="middle" font-size="15" font-weight="700" fill="#555" transform="rotate(-90, 60, 415)">個人 Individual</text>
  <line x1="80" y1="250" x2="80" y2="140" stroke="#999" stroke-width="1.2" marker-end="url(#arrowUp)"/>
  <line x1="80" y1="360" x2="80" y2="470" stroke="#999" stroke-width="1.2" marker-end="url(#arrowDown)"/>

  <!-- Top-left: 宏觀+素養 -->
  <text x="265" y="175" text-anchor="middle" font-size="13" fill="#aaa">（較少框架聚焦此象限）</text>

  <!-- Top-right: 宏觀+績效 -->
  <rect x="460" y="150" width="200" height="50" fill="#0088cc" rx="8"/>
  <text x="560" y="171" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Anthropic</text>
  <text x="560" y="189" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Economic Index</text>
  <text x="555" y="225" text-anchor="middle" font-size="11" fill="#557">統計總量層級的生產力估算</text>

  <!-- Bottom-left: 個人+素養 -->
  <rect x="145" y="340" width="110" height="32" fill="#e67e22" rx="6"/>
  <text x="200" y="361" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">UNESCO</text>

  <rect x="265" y="340" width="120" height="32" fill="#e67e22" rx="6"/>
  <text x="325" y="361" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">US DOL</text>

  <rect x="145" y="385" width="130" height="32" fill="#e67e22" rx="6"/>
  <text x="210" y="406" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Turing Institute</text>

  <rect x="285" y="385" width="100" height="32" fill="#e67e22" rx="6"/>
  <text x="335" y="406" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">學術量表</text>

  <rect x="165" y="430" width="180" height="32" fill="#d35400" rx="6"/>
  <text x="255" y="451" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">AI Fluency (4D)</text>

  <text x="245" y="490" text-anchor="middle" font-size="11" fill="#886">← 這裡擠滿了人</text>

  <!-- Bottom-right: 度量真空 -->
  <text x="555" y="380" text-anchor="middle" font-size="28" font-weight="700" fill="#ff6b35">?</text>
  <text x="555" y="410" text-anchor="middle" font-size="14" font-weight="700" fill="#ff6b35">度量真空</text>
  <text x="555" y="432" text-anchor="middle" font-size="12" fill="#cc5500">個人層級 × 基於績效 × 可驗證</text>

  <rect x="475" y="448" width="160" height="36" fill="#ff6b35" rx="8"/>
  <text x="555" y="464" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">AI Collaboration</text>
  <text x="555" y="479" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Portfolio ← 本文</text>
</svg>