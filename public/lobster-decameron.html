<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 龍蝦十日談 — AI 龍蝦十日談 · 知識管線產出範例</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF8;
    --bg-card: #FFFFFF;
    --bg-section: #F3F2EE;
    --text-primary: #1A1A1A;
    --text-secondary: #5A5A5A;
    --text-muted: #8A8A8A;
    --brand-navy: #1B2D4F;
    --brand-navy-light: #2A4470;
    --accent-ai: #2563EB;
    --border: #E8E6E1;
    --border-light: #F0EDE8;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
    --radius: 12px;
    --radius-lg: 20px;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'DM Sans', 'Noto Sans TC', sans-serif;
    --max-width: 860px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; font-size: 16px; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.8;
    -webkit-font-smoothing: antialiased;
  }

  /* === PIPELINE CONTEXT BAR === */
  .pipeline-bar {
    background: var(--brand-navy);
    color: rgba(255,255,255,0.9);
    text-align: center;
    padding: 12px 24px;
    font-size: 0.84rem;
    line-height: 1.6;
  }
  .pipeline-bar a {
    color: #93B5FF;
    text-decoration: underline;
    text-underline-offset: 2px;
    font-weight: 500;
  }
  .pipeline-bar .pipe-tag {
    display: inline-block;
    background: rgba(255,255,255,0.12);
    padding: 2px 10px;
    border-radius: 3px;
    font-size: 0.8rem;
    margin: 0 2px;
    font-weight: 500;
  }
